<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>落書き</title>

  <style>
    body {
      margin: 0;
      background-color: #008b8b;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: sans-serif;
    }

    /* イラスト表示エリア（正方形） */
    .image-box {
      width: 300px;
      height: 300px;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .image-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ボタンエリア */
    .buttons {
      margin-top: 20px;
      display: flex;
      gap: 10px;
    }

    button {
      padding: 10px 20px;
      border: none;
      background: white;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #ddd;
    }
  </style>
</head>

<body>

  <!-- イラスト表示 -->
  <div class="image-box">
    <img id="mainImage" src="img1.jpg">
  </div>

  <!-- ボタン -->
  <div class="buttons">
    <button onclick="nextImage()">未来</button>
    <button onclick="prevImage()">過去</button>
  </div>

  <script>
    const images = [
      "img1.png",
      "img2.png",
      "img3.png"
    ];

    let index = 0;

    function showImage() {
      document.getElementById("mainImage").src = images[index];
    }

    function nextImage() {
      index = (index + 1) % images.length;
      showImage();
    }

    function prevImage() {
      index = (index - 1 + images.length) % images.length;
      showImage();
    }
  </script>

</body>
</html>
